services:
  - type: web
    name: saferent-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate && gunicorn saferent.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: saferent-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: saferent-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://saferent.vercel.app

databases:
  - name: saferent-db
    plan: free
    postgresMajorVersion: "16"